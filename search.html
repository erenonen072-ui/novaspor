<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaSpor - Arama</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<div class="topbar">

<h1>🟡 NOVASPOR</h1>

<a href="index.html">🏠</a>

</div>

</header>



<main>


<section class="card">


<h2>🔎 NovaSpor Arama</h2>


<input 
id="searchInput"
type="text"
placeholder="Takım, haber veya sayfa ara..."
onkeyup="searchSite()"
>



<div id="results"></div>


</section>


</main>




<script>


const content = [


{
name:"Galatasaray",
link:"favorites.html"
},


{
name:"Fenerbahçe",
link:"favorites.html"
},


{
name:"Beşiktaş",
link:"favorites.html"
},


{
name:"Trabzonspor",
link:"favorites.html"
},


{
name:"Canlı Maçlar",
link:"live.html"
},


{
name:"Puan Durumu",
link:"standings.html"
},


{
name:"Fikstür",
link:"fixtures.html"
},


{
name:"Haberler",
link:"news.html"
},


{
name:"Favoriler",
link:"favorites.html"
},


{
name:"Hakkımızda",
link:"about.html"
}


];





function searchSite(){


let value =
document
.getElementById("searchInput")
.value
.toLowerCase();



let results =
content.filter(item =>

item.name
.toLowerCase()
.includes(value)

);



let box =
document.getElementById("results");



box.innerHTML="";



if(value===""){

return;

}



if(results.length===0){

box.innerHTML=
`
<div class="search-result">
❌ Sonuç bulunamadı
</div>
`;

return;

}



results.forEach(item=>{


box.innerHTML +=

`

<a href="${item.link}" class="search-result">

⚽ ${item.name}

</a>

`;

});


}



</script>



</body>

</html>
